syntax = "proto3";
import "google/protobuf/empty.proto";
option csharp_namespace = "NexusPay.Contracts";

package user;

service UserService {
  rpc CreateUser (CreateUserGrpcRequest) returns (google.protobuf.Empty);
  rpc UpdateUser (UpdateUserGrpcRequest) returns (google.protobuf.Empty);
  rpc DeleteUser (DeleteUserGrpcRequest) returns (google.protobuf.Empty);
}

message CreateUserGrpcRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  int32 roleId = 4;
}

message UpdateUserGrpcRequest {
  string id = 1;
  string name = 2;
  string email = 3;
}

message DeleteUserGrpcRequest {
  string id = 1;
}
