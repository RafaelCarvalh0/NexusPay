syntax = "proto3";

option csharp_namespace = "NexusPay.Contracts";

package auth;

service AuthService {
  rpc Login  (LoginGrpcRequest)  returns (LoginGrpcResponse);
  rpc Logout (LogoutGrpcRequest) returns (LogoutGrpcResponse);
  rpc IsTokenRevoked  (IsTokenRevokedGrpcRequest)  returns (IsTokenRevokedGrpcResponse);
}

message LoginGrpcRequest {
  string email    = 1;
  string password = 2;
}

message LoginGrpcResponse {
  string token      = 1;
  string token_type = 2;
  int32  expires_in = 3;
  string user_id    = 4;
  string user_name  = 5;
  string role       = 6;
}

message LogoutGrpcRequest {
  string jti = 1;
  string user_id = 2;
}

message LogoutGrpcResponse {
  string message = 1;
}

message IsTokenRevokedGrpcRequest {
  string jti = 1;
}

message IsTokenRevokedGrpcResponse {
  bool is_revoked = 1;
}