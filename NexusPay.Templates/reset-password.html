<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay - Nova Senha</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-global: #f8fafc;
            --bg-card: #ffffff;
            --primary: #0066cc;
            --primary-hover: #0052a3;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-field: #cbd5e1;
            --border-focus: #3b82f6;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-global);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
        }

        p {
            margin: 0 0 24px 0;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-field);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.2s ease;
            background-color: #fff;
        }

        input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 8px;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .error-summary {
            background-color: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.5;
        }

        .error-summary div {
            margin-bottom: 4px;
        }

        .error-summary div:last-child {
            margin-bottom: 0;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="brand">NexusPay</div>
        <h2>Criar Nova Senha</h2>
        <p>Digite sua nova senha nos campos abaixo para restabelecer o acesso à sua conta.</p>

        <div id="errorSummary" class="error-summary"></div>

        <form id="resetForm">
            <div class="field">
                <label for="password">Nova Senha</label>
                <input type="password" id="password" required minlength="6" placeholder="No mínimo 6 caracteres">
            </div>
            <div class="field">
                <label for="confirmPassword">Confirmar Nova Senha</label>
                <input type="password" id="confirmPassword" required placeholder="Repita a senha digitada acima">
            </div>
            <button type="submit" id="btnSubmit">Salvar Nova Senha</button>
        </form>
    </div>

    <script>
        // Isolamento de escopo para evitar poluição global
        (() => {
            const API_URL = 'https://localhost:7229/auth/ResetPassword';

            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const token = urlParams.get('token');

            const form = document.getElementById('resetForm');
            const errorSummary = document.getElementById('errorSummary');
            const btnSubmit = document.getElementById('btnSubmit');

            // Validação de integridade da URL assim que a página carrega
            if (!email || !token) {
                showInlineError("Parâmetros de recuperação inválidos ou ausentes na URL.");
                btnSubmit.disabled = true;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearInlineError();

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // 1. Validação do lado do cliente (Client-side)
                if (password !== confirmPassword) {
                    showInlineError("As senhas digitadas não coincidem.");
                    return;
                }

                setLoadingState(true);

                try {
                    // 2. Disparo para a API Gateway do NexusPay
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, token, newPassword: password })
                    });

                    const data = await response.json();

                    // 3. Processamento das respostas
                    if (response.ok) {
                        await Swal.fire({
                            icon: 'success',
                            title: 'Senha Alterada!',
                            text: 'Sua senha foi redefinida com sucesso no NexusPay. Você já pode fazer o login.',
                            confirmButtonColor: '#0066cc',
                            confirmButtonText: 'Entendido'
                        });

                        // Opcional: Redirecionar após o OK do usuário
                        // window.location.href = "https://nexuspay.com.br/login";
                    } else {
                        handleBackendErrors(data);
                    }

                } catch (error) {
                    console.error("Erro na conexão:", error);
                    showInlineError("Não foi possível conectar ao servidor do NexusPay. Tente novamente mais tarde.");
                } finally {
                    setLoadingState(false);
                }
            });

            // Gerenciador de erros vindo do array 'messages' ou erros genéricos de infra
            function handleBackendErrors(data) {
                if (data.messages && Array.isArray(data.messages) && data.messages.length > 0) {
                    // Limpa e renderiza o array de mensagens na div inline
                    errorSummary.innerHTML = data.messages.map(msg => `<div>• ${msg}</div>`).join('');
                    errorSummary.style.display = 'block';
                } else {
                    showInlineError(data.error || "Erro ao redefinir senha. O link pode ter expirado ou ser inválido.");
                }
            }

            function showInlineError(message) {
                errorSummary.innerText = message;
                errorSummary.style.display = 'block';
            }

            function clearInlineError() {
                errorSummary.innerHTML = "";
                errorSummary.style.display = 'none';
            }

            function setLoadingState(isLoading) {
                if (isLoading) {
                    btnSubmit.disabled = true;
                    btnSubmit.innerText = "Salvando...";
                } else {
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "Salvar Nova Senha";
                }
            }
        })();
    </script>
</body>

</html>
