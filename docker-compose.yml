# docker-compose.yml
services:
    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: nexuspay-sqlserver
        environment:
            SA_PASSWORD: "NexusPay@123"
            ACCEPT_EULA: "Y"
            MSSQL_PID: "Developer"
        ports:
            - "1433:1433"
        volumes:
            - sqlserver_data:/var/opt/mssql

volumes:
    sqlserver_data:
