services:
    sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: nexuspay-sqlserver
        environment:
            SA_PASSWORD: "NexusPay@123"
            ACCEPT_EULA: "Y"
            MSSQL_PID: "Developer"
        ports:
            - "1433:1433"
        volumes:
            - sqlserver_data:/var/opt/mssql

    cloudbeaver:
        image: dbeaver/cloudbeaver:latest
        container_name: nexuspay-cloudbeaver
        ports:
            - "8978:8978"
        depends_on:
            - sqlserver
        volumes:
            - cloudbeaver_data:/opt/cloudbeaver/workspace

volumes:
    sqlserver_data:
    cloudbeaver_data:
